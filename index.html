<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Finanzas 360 v12</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<style>
:root{--bg:#f5f4ef;--card:#fff;--brd:#e5e3dc;--t1:#1a1a18;--t2:#6b6a65;--t3:#a3a29b;--blue:#2563eb;--bluebg:#eff4ff;--bluet:#1e40af;--green:#16a34a;--greenbg:#ecfdf5;--greent:#166534;--red:#dc2626;--redbg:#fef2f2;--redt:#991b1b;--amber:#d97706;--amberbg:#fffbeb;--ambert:#92400e;--purple:#7c3aed;--purplebg:#f5f3ff;--purplet:#5b21b6;--teal:#0d9488;--tealbg:#f0fdfa;--tealt:#115e59;--r:10px;--rl:14px}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'DM Sans',system-ui,sans-serif;background:var(--bg);color:var(--t1);font-size:13px;line-height:1.5;-webkit-font-smoothing:antialiased}
input,select,button{font-family:inherit;font-size:12px;outline:none}
input,select{padding:7px 9px;border:1px solid var(--brd);border-radius:8px;background:#fff;color:var(--t1);transition:border .15s;width:100%}
input:focus,select:focus{border-color:var(--blue)}
button{cursor:pointer;border:none;border-radius:8px;padding:7px 13px;font-weight:500;transition:all .12s}
button:active{transform:scale(.97)}
.app{max-width:1100px;margin:0 auto;padding:14px}
/* NAV */
.nav{display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px;margin-bottom:12px}
.logo{font-size:18px;font-weight:700;letter-spacing:-.4px}
.nav-r{display:flex;gap:6px;align-items:center;flex-wrap:wrap}
.ptabs{display:flex;background:var(--card);border:1px solid var(--brd);border-radius:10px;padding:3px;gap:2px}
.ptab{padding:5px 10px;border-radius:7px;background:transparent;color:var(--t2);font-size:11px;font-weight:500}
.ptab.on{background:var(--t1);color:#fff}
.wa-area{display:flex;gap:3px;align-items:center;flex-wrap:wrap}
.wa-area input{width:110px;font-size:10px;padding:4px 6px;border-color:#25D366}
.wa-area .ws{font-size:9px;color:var(--greent);background:var(--greenbg);padding:2px 5px;border-radius:4px}
.bwa{background:#25D366;color:#fff;padding:4px 8px;font-size:10px}
/* ALERTS */
.alert{border-radius:var(--r);padding:9px 12px;margin-bottom:5px;font-size:12px;font-weight:500}
.alert.err{background:#1c0606;color:#fca5a5;border:1.5px solid #7f1d1d}
.alert.warn{background:#1a0f00;color:#fcd34d;border:1.5px solid #78350f}
.alert.ok{background:var(--greenbg);color:var(--greent);border:1px solid #86efac}
/* SUMMARY */
.sg{display:grid;grid-template-columns:repeat(4,1fr);gap:6px;margin-bottom:6px}
.sc{background:var(--card);border:1px solid var(--brd);border-radius:var(--rl);padding:10px 12px}
.sc label{font-size:9px;color:var(--t3);display:block;margin-bottom:1px;text-transform:uppercase;letter-spacing:.3px}
.sc .v{font-size:18px;font-weight:700;font-variant-numeric:tabular-nums}
.sc.pos .v{color:var(--green)}.sc.neg .v{color:var(--red)}.sc.blu .v{color:var(--blue)}
/* FISCAL */
.fg5{display:grid;grid-template-columns:repeat(5,1fr);gap:4px;margin-bottom:6px}
.fc{background:var(--card);border:1px solid var(--brd);border-radius:8px;padding:6px 8px;text-align:center}
.fc label{font-size:7px;color:var(--t3);display:block;text-transform:uppercase;letter-spacing:.3px}
.fc .v{font-size:14px;font-weight:700;color:var(--red)}
.fc .sub{font-size:9px;color:var(--t3)}
.fc.rec{border-color:var(--blue);background:var(--bluebg)}.fc.rec .v{color:var(--blue)}
/* RULE */
.r3{display:grid;grid-template-columns:repeat(3,1fr);gap:6px;margin-bottom:6px}
.rc{border-radius:var(--rl);padding:12px}
.rc.n{background:var(--bluebg);border:1px solid #bfdbfe}.rc.d{background:var(--amberbg);border:1px solid #fde68a}.rc.a{background:var(--greenbg);border:1px solid #bbf7d0}
.rc.over{background:#1c0606!important;border:2px solid var(--red)!important}
.rp{font-size:28px;font-weight:700;line-height:1}
.rc.n .rp{color:var(--bluet)}.rc.d .rp{color:var(--ambert)}.rc.a .rp{color:var(--greent)}.rc.over .rp{color:#fca5a5}
.rl2{font-size:8px;font-weight:600;text-transform:uppercase;letter-spacing:.5px;margin:2px 0 7px;opacity:.7}.rc.over .rl2{color:#fca5a5}
.rbar{height:5px;background:rgba(0,0,0,.08);border-radius:99px;margin-bottom:4px}.rfill{height:100%;border-radius:99px}
.rc.n .rfill{background:var(--blue)}.rc.d .rfill{background:var(--amber)}.rc.a .rfill{background:var(--green)}.rc.over .rfill{background:var(--red)}
.rn{font-size:9px;display:flex;justify-content:space-between;color:var(--t2)}.rc.over .rn{color:#fca5a5}
/* DONUTS */
.d3{display:grid;grid-template-columns:repeat(3,1fr);gap:6px;margin-bottom:8px}
.db{background:var(--card);border:1px solid var(--brd);border-radius:var(--rl);padding:10px}
.db h4{font-size:10px;font-weight:600;margin-bottom:5px}
canvas.dc{display:block;margin:0 auto}
.leg{margin-top:5px}.li{display:flex;align-items:center;gap:4px;margin:2px 0}.li .dot{width:8px;height:8px;border-radius:2px}.li span{font-size:9px;color:var(--t2)}
/* MODULE TABS */
.mt{display:flex;background:var(--card);border:1px solid var(--brd);border-radius:var(--r);padding:3px;gap:2px;margin-bottom:8px;overflow-x:auto}
.mb{padding:6px 12px;border-radius:7px;background:transparent;color:var(--t2);font-size:11px;font-weight:600;white-space:nowrap}
.mb:hover{background:var(--bg)}.mb.on{background:var(--t1);color:#fff}
.mod{display:none}.mod.vis{display:block}
/* PANEL */
.pnl{background:var(--card);border:1px solid var(--brd);border-radius:var(--rl);padding:12px;margin-bottom:5px}
.pnl h3{font-size:13px;font-weight:600;margin-bottom:8px}
.gl{display:grid;grid-template-columns:260px 1fr;gap:8px}
.fld{margin-bottom:5px}.fld label{display:block;font-size:8px;color:var(--t3);margin-bottom:1px;text-transform:uppercase;letter-spacing:.2px}
.fg2{display:grid;grid-template-columns:1fr 1fr;gap:5px}
.fg3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:4px}
.fg4{display:grid;grid-template-columns:1fr 1fr 1fr 1fr;gap:4px}
.ftabs{display:flex;background:var(--bg);border-radius:7px;padding:2px;gap:2px;margin-bottom:8px}
.ft{flex:1;padding:5px;border-radius:5px;background:transparent;color:var(--t2);font-size:10px;font-weight:500;text-align:center}
.ft.on{background:var(--card);color:var(--t1);box-shadow:0 1px 2px rgba(0,0,0,.04)}
.bp{background:var(--t1);color:#fff;width:100%;padding:8px;font-weight:600}
.bg2{background:var(--green);color:#fff;width:100%;padding:8px;font-weight:600}
.bre{background:var(--redbg);color:var(--redt);padding:3px 7px;font-size:10px;border:1px solid #fecaca}
.bge{background:var(--greenbg);color:var(--greent);padding:3px 7px;font-size:10px;border:1px solid #bbf7d0}
.bbl{background:var(--bluebg);color:var(--bluet);width:100%;padding:8px;font-weight:600;border:1px solid #bfdbfe}
.bam{background:var(--amberbg);color:var(--ambert);width:100%;padding:8px;font-weight:600;border:1px solid #fde68a}
.bsm{padding:3px 6px;font-size:10px}
.badge{display:inline-flex;padding:2px 6px;border-radius:99px;font-size:9px;font-weight:600}
.b-bl{background:var(--bluebg);color:var(--bluet)}.b-gr{background:var(--greenbg);color:var(--greent)}.b-re{background:var(--redbg);color:var(--redt)}.b-am{background:var(--amberbg);color:var(--ambert)}.b-gy{background:var(--bg);color:var(--t2)}.b-pu{background:var(--purplebg);color:var(--purplet)}.b-te{background:var(--tealbg);color:var(--tealt)}
/* CARDS */
.cg{display:grid;grid-template-columns:repeat(auto-fill,minmax(240px,1fr));gap:6px;margin-top:6px}
.crd{background:var(--card);border:1px solid var(--brd);border-radius:var(--rl);padding:10px}
.crd:hover{border-color:var(--t3)}
.crd-h{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:3px}
.crd-t{font-size:12px;font-weight:600}.crd-v{font-size:18px;font-weight:700;font-variant-numeric:tabular-nums;margin:3px 0}
.crd-r{display:flex;justify-content:space-between;font-size:9px;color:var(--t2);margin:2px 0}
.crd-f{margin-top:5px;padding-top:5px;border-top:1px solid var(--brd);display:flex;gap:3px;align-items:center;flex-wrap:wrap}
.crd-f input{flex:1;min-width:80px;padding:5px 7px;font-size:11px}
.btk{height:3px;background:var(--bg);border-radius:99px;overflow:hidden;margin:3px 0}.bfl{height:100%;border-radius:99px}
.spk{display:flex;align-items:flex-end;gap:1px;height:16px;margin-top:3px}.spk div{flex:1;min-width:3px;border-radius:2px 2px 0 0}
.barchart{display:flex;align-items:flex-end;gap:1px;height:40px;margin:4px 0}.barchart div{flex:1;min-width:3px;border-radius:2px 2px 0 0;background:#bfdbfe}
.tbl{border:1px solid var(--brd);border-radius:8px;overflow:hidden;margin-top:5px}
table{width:100%;border-collapse:collapse}
th{padding:5px 8px;text-align:left;font-size:8px;font-weight:600;color:var(--t3);text-transform:uppercase;border-bottom:1px solid var(--brd);background:var(--bg)}
td{padding:6px 8px;font-size:11px;border-bottom:1px solid var(--brd)}
tr:last-child td{border-bottom:none}tr:hover td{background:var(--bg)}
.pag{display:flex;align-items:center;justify-content:center;gap:4px;padding:6px}
.pag button{padding:3px 8px;border-radius:5px;border:1px solid var(--brd);background:var(--card);font-size:10px;color:var(--t2)}
.pag button:disabled{opacity:.3}.pag span{font-size:9px;color:var(--t3)}
.empty{text-align:center;padding:1.5rem;color:var(--t3);font-size:11px;border:1px dashed var(--brd);border-radius:8px;margin-top:5px}
.add-r{display:flex;gap:3px;align-items:center;margin-top:4px}.add-r input{flex:1;font-size:10px;padding:4px 6px}
.tog-r{display:flex;align-items:center;gap:6px;padding:5px 7px;background:var(--bg);border-radius:6px;cursor:pointer;margin-bottom:5px}
.tog{width:26px;height:14px;border-radius:7px;background:var(--brd);position:relative;flex-shrink:0}.tog.on{background:var(--green)}
.tog-d{width:9px;height:9px;background:#fff;border-radius:50%;position:absolute;top:2.5px;left:2px;transition:left .2s}.tog.on .tog-d{left:15px}
.qbs{display:flex;gap:3px;margin-bottom:5px}.qb{flex:1;padding:5px;border-radius:5px;border:1px solid var(--brd);background:transparent;font-size:10px;font-weight:500;color:var(--t2)}.qb.on{background:var(--greenbg);color:var(--greent);border-color:#bbf7d0}
.ded{background:var(--redbg);border:1px solid #fecaca;border-radius:7px;padding:6px;margin-bottom:5px}.ded-t{font-size:8px;font-weight:600;color:var(--redt);text-align:center;margin-bottom:4px}
.tc2{display:flex;flex-wrap:wrap;gap:3px;margin-bottom:5px}.tc{padding:4px 8px;border-radius:5px;border:1px solid var(--brd);background:transparent;font-size:10px;color:var(--t2)}.tc.on{background:var(--t1);color:#fff}
.proj{padding:8px;border-radius:7px;margin-top:5px;font-size:11px}.proj.ok{background:var(--greenbg);color:var(--greent);border:1px solid #bbf7d0}.proj.bad{background:var(--redbg);color:var(--redt);border:1px solid #fecaca}
.pmtg{display:grid;grid-template-columns:repeat(auto-fill,minmax(26px,1fr));gap:2px;margin-top:4px}
.pm{text-align:center;padding:3px;border-radius:3px;font-size:8px;font-weight:600}.pm.paid{background:var(--greenbg);color:var(--greent)}.pm.pending{background:var(--bg);color:var(--t3)}.pm.active{background:var(--amberbg);color:var(--ambert);border:1.5px solid #fde68a;cursor:pointer}
.super-box{background:var(--amberbg);border:1px solid #fde68a;border-radius:7px;padding:6px;margin-bottom:5px}
.super-box label{font-size:9px;font-weight:600;color:var(--ambert);display:block;margin-bottom:3px}
/* ROLE SELECTOR */
.role-sel{display:flex;gap:3px;margin-bottom:6px}
.role-btn{flex:1;padding:8px;border-radius:8px;border:1.5px solid var(--brd);background:transparent;font-size:11px;font-weight:600;color:var(--t2);text-align:center}
.role-btn.lend{background:var(--bluebg);color:var(--bluet);border-color:#bfdbfe}
.role-btn.borrow{background:var(--redbg);color:var(--redt);border-color:#fecaca}
/* DEBIT ACCOUNTS */
.acct-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:5px;margin-top:5px}
.acct{background:var(--card);border:1px solid var(--brd);border-radius:var(--rl);padding:10px}
.acct:hover{border-color:var(--t3)}
.acct-name{font-size:12px;font-weight:600}
.acct-tag{font-size:8px;display:inline-block;padding:1px 5px;border-radius:4px;margin-top:2px}
.acct-bal{font-size:20px;font-weight:700;margin:4px 0;font-variant-numeric:tabular-nums;color:var(--blue)}
.xfer-box{background:var(--bg);border-radius:8px;padding:8px;margin-top:6px}
.liquid-total{background:linear-gradient(135deg,var(--bluebg),var(--greenbg));border:1px solid #bfdbfe;border-radius:var(--rl);padding:14px;margin-bottom:8px;text-align:center}
.liquid-total label{font-size:9px;color:var(--t2);text-transform:uppercase;letter-spacing:.5px}
.liquid-total .v{font-size:28px;font-weight:700;color:var(--blue)}
/* RESPONSIVE */
@media(max-width:768px){.sg{grid-template-columns:1fr 1fr}.fg5{grid-template-columns:repeat(3,1fr)}.r3,.d3{grid-template-columns:1fr}.gl{grid-template-columns:1fr}.cg,.acct-grid{grid-template-columns:1fr 1fr}}
@media(max-width:480px){.sg{grid-template-columns:1fr 1fr}.fg5{grid-template-columns:repeat(3,1fr)}.d3{grid-template-columns:1fr}.fg2,.fg3,.fg4{grid-template-columns:1fr}.cg,.acct-grid{grid-template-columns:1fr}}
</style>
</head>
<body>
<div class="app">
<!-- NAV -->
<div class="nav"><div class="logo">Finanzas 360 <span style="font-size:10px;color:var(--t3);font-weight:400">v12</span></div>
<div class="nav-r"><div class="wa-area" id="wa"></div>
<div class="ptabs"><button class="ptab" onclick="setP('dia',this)">Hoy</button><button class="ptab" onclick="setP('sem',this)">Sem</button><button class="ptab on" onclick="setP('mes',this)">Mes</button><button class="ptab" onclick="setP('año',this)">Año</button><button class="ptab" onclick="setP('todo',this)">Todo</button></div></div></div>
<div id="alerts"></div>
<div class="sg" id="sum"></div>
<div class="fg5" id="fis"></div>
<div class="r3" id="rule"></div>
<div class="d3" id="donuts"></div>
<!-- TABS -->
<div class="mt">
<button class="mb on" onclick="ST('g',this)">Gastos</button>
<button class="mb" onclick="ST('a',this)">Ahorros</button>
<button class="mb" onclick="ST('d',this)">Crédito</button>
<button class="mb" onclick="ST('r',this)">Recurrentes</button>
<button class="mb" onclick="ST('f',this)">Futuros</button>
<button class="mb" onclick="ST('p',this)">Préstamos</button>
<button class="mb" onclick="ST('b',this)">Cuentas Débito</button>
<button class="mb" onclick="ST('v',this)">🚗 Vehículos</button>
<button class="mb" onclick="ST('cfg',this)">⚙ Config</button>
</div>
<div id="p-g" class="mod vis"></div><div id="p-a" class="mod"></div><div id="p-d" class="mod"></div>
<div id="p-r" class="mod"></div><div id="p-f" class="mod"></div><div id="p-p" class="mod"></div><div id="p-b" class="mod"></div><div id="p-v" class="mod"></div><div id="p-cfg" class="mod"></div>
</div>

<script>
// ═══════════════════════════════════════════════════════════════════════════════
// FINANZAS 360 v12 — COMPLETE CRUD
// Modules: Gastos, Ahorros, Crédito, Recurrentes, Futuros, Préstamos, Débito
// ═══════════════════════════════════════════════════════════════════════════════

const CATS={NOMINA:{n:'Nómina',iv:0,ie:0,r:'',c:['Nómina Q1','Nómina Q2']},EXTRA:{n:'Extra',iv:0,ie:0,r:'',c:['Freelance','Venta','Bono','Renta recibida']},CREDITO:{n:'Crédito',iv:0,ie:0,r:'N',c:['Traspaso','Comisión','Intereses','Anualidad']},SERVICIOS:{n:'Servicios',iv:.16,ie:0,rec:1,r:'N',c:[{n:'Internet',f:'mensual'},{n:'Celular',f:'mensual'},{n:'Luz',f:'bimestral'},{n:'Agua',f:'trimestral'},{n:'Gas',f:'bimestral'}]},ALIMENTOS:{n:'Alimentos',iv:0,ie:0,r:'N',c:['Frutas/Verduras','Carne/Pollo','Tortillas']},DESPENSA:{n:'Despensa',iv:.16,ie:0,r:'N',c:['Abarrotes','Limpieza','Higiene','Super (IVA ticket)']},SALUD:{n:'Salud',iv:0,ie:0,r:'N',c:['Consulta','Medicinas','Seguro']},RENTA:{n:'Renta',iv:0,ie:0,r:'N',c:['Renta','Hipoteca']},TRANSPORTE:{n:'Transporte',iv:.16,ie:.08,r:'N',c:['Gasolina','Manten.','Seguro Auto']},APP:{n:'App',iv:.16,ie:0,r:'D',c:['Uber','DiDi','InDriver','Rappi']},ENTRET:{n:'Entret.',iv:.16,ie:0,rec:1,r:'D',c:[{n:'Netflix',f:'mensual'},{n:'Spotify',f:'mensual'},{n:'Disney+',f:'mensual'},{n:'Max',f:'mensual'},{n:'Cine',f:null}]},RESTAURANTES:{n:'Restaurantes',iv:.16,ie:0,r:'D',c:['Restaurante','Café','Comida rápida']},MODA:{n:'Compras',iv:.16,ie:0,r:'D',c:['Ropa','Calzado','Electrónica']},VIAJES:{n:'Viajes',iv:.16,ie:0,r:'D',c:['Vuelos','Hotel','Tour']},AHORRO_INV:{n:'Ahorro/Inv',iv:0,ie:0,r:'A',c:['Depósito','CETES','Fondo emerg.']},DEUDA_PAGO:{n:'Pago Deudas',iv:0,ie:0,r:'A',c:['Abono extra','Pago tarjeta','Pago préstamo']}};
const FR={semanal:{l:'Semanal',m:.25},quincenal:{l:'Quincenal',m:.5},mensual:{l:'Mensual',m:1},bimestral:{l:'Bimestral',m:2},trimestral:{l:'Trimestral',m:3}};
const INS=['BBVA','Mercado Pago','Nu','Santander','Efectivo'];
const TCRED={TARJETA:{l:'Tarjeta',b:'b-bl'},PRESTAMO:{l:'Préstamo',b:'b-am'},DISPOSICION:{l:'Disp.',b:'b-re'},BNPL:{l:'Meses',b:'b-pu'},LINEA:{l:'Línea',b:'b-gr'}};
const RN=['CREDITO','SERVICIOS','ALIMENTOS','DESPENSA','SALUD','RENTA','TRANSPORTE'],RD=['APP','ENTRET','RESTAURANTES','MODA','VIAJES'],RA=['AHORRO_INV','DEUDA_PAGO'];
const COL={'RENTA':'#818cf8','SERVICIOS':'#60a5fa','ALIMENTOS':'#4ade80','DESPENSA':'#86efac','TRANSPORTE':'#fbbf24','CREDITO':'#f87171','APP':'#f59e0b','ENTRET':'#ec4899','RESTAURANTES':'#fb923c','MODA':'#f472b6','VIAJES':'#2dd4bf','AHORRO_INV':'#22c55e','DEUDA_PAGO':'#ef4444','SALUD':'#5eead4'};

// ═══ HELPERS ══════════════════════════════════════════════════════════════════
const uid=()=>Date.now().toString(36)+Math.random().toString(36).slice(2,5);
const fm=n=>Number(n||0).toLocaleString('es-MX',{minimumFractionDigits:2,maximumFractionDigits:2});
const fk=n=>{const x=Number(n||0);return x>=10000?'$'+(x/1000).toFixed(1)+'k':'$'+fm(x)};
const cn=c=>typeof c==='string'?c:c.n;
const cfr=c=>typeof c==='string'?null:c.f;
const td=()=>new Date().toISOString().split('T')[0];
const gt=h=>{if(!h||h.length<2)return'=';return h[h.length-1].s>h[h.length-2].s?'↑':h[h.length-1].s<h[h.length-2].s?'↓':'='};
const dh=d=>{if(!d)return null;const h=new Date();h.setHours(0,0,0,0);let t=new Date(h.getFullYear(),h.getMonth(),d);if(t<=h)t=new Date(h.getFullYear(),h.getMonth()+1,d);return Math.ceil((t-h)/864e5)};
const df=s=>{if(!s)return null;const h=new Date();h.setHours(0,0,0,0);return Math.ceil((new Date(s+'T00:00:00')-h)/864e5)};

const [fType,fId]=fromKey.split(':'),[tType,tId]=toKey.split(':');
let fromName='',toName='';

if(fType==='ah'){const a=D.ah.find(x=>x.id===fId);if(!a){alert('Cuenta origen no encontrada');return}if(a.s<amt){alert(`Saldo insuficiente. ${a.n} tiene $${fm(a.s)}`);return}a.s-=amt;a.h=[...(a.h||[]),{f:td(),s:a.s}];fromName=a.n}

const addCfgCat=()=>{const key=document.getElementById('cfg-ck')?.value?.trim().toUpperCase().replace(/\s/g,'_');const name=document.getElementById('cfg-cn')?.value?.trim();if(!key||!name){alert('Ingresa clave y nombre');return}if(CATS[key]||D.cfgCats.find(c=>c.key===key)){alert('Esa clave ya existe');return}const iva=parseFloat(document.getElementById('cfg-cv')?.value||0)/100;const ieps=parseFloat(document.getElementById('cfg-ce')?.value||0)/100;const rule=document.getElementById('cfg-cr')?.value||'';const rec=document.getElementById('cfg-cc')?.value==='1';const concepts=(document.getElementById('cfg-co')?.value||'').split(',').map(s=>s.trim()).filter(Boolean);D.cfgCats.push({id:uid(),key,name,iva,ieps,rule,rec,concepts});sv();rCfg()};

const addCfgConc=()=>{const cat=document.getElementById('cfg-ec')?.value;const name=document.getElementById('cfg-en')?.value?.trim();if(!cat||!name)return;if(!D.cfgExtraConcepts)D.cfgExtraConcepts=[];D.cfgExtraConcepts.push({cat,name});sv();rCfg()};

const addCfgTax=()=>{const name=document.getElementById('cfg-tn')?.value?.trim();const pct=parseFloat(document.getElementById('cfg-tp')?.value||0);if(!name||!pct)return;D.cfgTaxes.push({name,pct});sv();rCfg()};

const ASEG=['AXA','BBVA Seguros','Qualitas','GNP','HDI','Mapfre','Chubb','Zurich','Inbursa','Banorte Seguros','Ana Seguros','Otra...'];
const COB=['Responsabilidad civil','Amplia','Limitada','Básica','Todo riesgo'];
const VTIPOS={auto:'🚗 Auto',moto:'🏍 Moto',electrico:'⚡ Eléctrico',camioneta:'🛻 Camioneta',biciE:'🚲 Bici eléctrica'};

const VPER={anual:'Anual',bianual:'Cada 2 años',trianual:'Cada 3 años',permanente:'Permanente',otro:'Otro'};
const SPLZ=['Contado','Mensual','Trimestral','Semestral','Anual'];

const vehGastoTotal=()=>(D.vehs||[]).reduce((s,v)=>{
  return s+(v.licencias||[]).reduce((s2,l)=>s2+l.costo,0)+(v.placas||[]).reduce((s2,p)=>s2+p.costo,0)+(v.tarjCirc||[]).reduce((s2,t)=>s2+t.costo,0)+(v.seguros||[]).reduce((s2,sg)=>s2+sg.costo,0)},0);

const rVeh=()=>{
if(!D.vehs)D.vehs=[];
const tG=vehGastoTotal(),tIVA=tG*0.16/1.16;
const recItems=[];
(D.vehs||[]).forEach(v=>{const vn=v.nombre||v.marca;
(v.licencias||[]).filter(l=>l.rec).forEach(l=>recItems.push({n:`🪪 Lic. ${l.tipo} — ${vn}`,m:l.costo,p:l.periodo,fv:l.fVence}));
(v.placas||[]).filter(p=>p.rec).forEach(p=>recItems.push({n:`🔢 Placas ${p.tipo} — ${vn}`,m:p.costo,p:p.periodo,fv:p.fVence}));
(v.tarjCirc||[]).filter(t=>t.rec).forEach(t=>recItems.push({n:`📄 Tarj. Circ. — ${vn}`,m:t.costo,p:t.periodo,fv:t.fVence}));
(v.seguros||[]).forEach(sg=>recItems.push({n:`🛡 ${sg.aseguradora} — ${vn}`,m:sg.costo,p:sg.plazo,fv:sg.fVence}));
});

<div style="margin-top:4px">
${lics.map((l,i)=>{const dd=df(l.fVence);return`<div style="display:flex;gap:4px;align-items:center;padding:5px 0;border-bottom:1px solid var(--brd);font-size:10px;flex-wrap:wrap">

};

const venceAlert=fv=>{if(!fv)return'';const d2=df(fv);if(d2===null)return'';if(d2<0)return'<span class="badge b-re">Vencido</span>';if(d2<=30)return`<span class="badge b-am">${d2}d</span>`;return''};

const addVeh=()=>{const tp=document.getElementById('vh-tp')?.value||'auto',mk=document.getElementById('vh-mk')?.value?.trim()||'',nm=document.getElementById('vh-nm')?.value?.trim()||'';if(!mk){alert('Ingresa la marca');return}D.vehs.push({id:uid(),nombre:nm||mk,tipo:tp,marca:mk,licencias:[],placas:[],tarjCirc:[],seguros:[]});sv();rVeh()};

const addVehLic=(vid)=>{const v=D.vehs.find(x=>x.id===vid);if(!v)return;const tp=document.getElementById('vla-tp-'+vid)?.value||'Automovilista',tt=document.getElementById('vla-tt-'+vid)?.value?.trim()||'',co=parseFloat(document.getElementById('vla-co-'+vid)?.value||0),fv=document.getElementById('vla-fv-'+vid)?.value||'',rc=document.getElementById('vla-rc-'+vid)?.checked||false,pe=document.getElementById('vla-pe-'+vid)?.value||'anual';if(!co){alert('Ingresa costo');return}v.licencias.push({id:uid(),tipo:tp,titular:tt,costo:co,fPago:td(),fVence:fv,rec:rc,periodo:pe});sv();rVeh()};

const addVehPlaca=(vid)=>{const v=D.vehs.find(x=>x.id===vid);if(!v)return;const tp=document.getElementById('vpa-tp-'+vid)?.value||'Particular',es=document.getElementById('vpa-es-'+vid)?.value?.trim()||'',co=parseFloat(document.getElementById('vpa-co-'+vid)?.value||0),fp=document.getElementById('vpa-fp-'+vid)?.value||td(),rc=document.getElementById('vpa-rc-'+vid)?.checked||false,pe=document.getElementById('vpa-pe-'+vid)?.value||'anual';if(!co){alert('Ingresa costo');return}v.placas.push({id:uid(),tipo:tp,estado:es,costo:co,fPago:fp,rec:rc,periodo:pe});sv();rVeh()};

const addVehTC=(vid)=>{const v=D.vehs.find(x=>x.id===vid);if(!v)return;const co=parseFloat(document.getElementById('vtca-co-'+vid)?.value||0),fp=document.getElementById('vtca-fp-'+vid)?.value||td(),fv=document.getElementById('vtca-fv-'+vid)?.value||'',rc=document.getElementById('vtca-rc-'+vid)?.checked!==false,pe=document.getElementById('vtca-pe-'+vid)?.value||'anual';if(!co){alert('Ingresa costo');return}v.tarjCirc.push({id:uid(),costo:co,fPago:fp,fVence:fv,rec:rc,periodo:pe});sv();rVeh()};

const addVehSeg=(vid)=>{const v=D.vehs.find(x=>x.id===vid);if(!v)return;let aseg=document.getElementById('vsa-as-'+vid)?.value||'';if(aseg==='Otra...'){aseg=prompt('Nombre de la aseguradora:');if(!aseg)return}const cb=document.getElementById('vsa-cb-'+vid)?.value||'Amplia',co=parseFloat(document.getElementById('vsa-co-'+vid)?.value||0),pl=document.getElementById('vsa-pl-'+vid)?.value||'Anual',fp=document.getElementById('vsa-fp-'+vid)?.value||td(),fv=document.getElementById('vsa-fv-'+vid)?.value||'',po=document.getElementById('vsa-po-'+vid)?.value?.trim()||'',no=document.getElementById('vsa-no-'+vid)?.value?.trim()||'';if(!co){alert('Ingresa costo');return}v.seguros.push({id:uid(),aseguradora:aseg,tipoCobertura:cb,costo:co,plazo:pl,fPago:fp,fVence:fv,poliza:po,notas:no});sv();rVeh()};

const updVehItem=(vid,arr,idx)=>{const v=D.vehs.find(x=>x.id===vid);if(!v||!v[arr]||!v[arr][idx])return;const prefixes={licencias:'vl',placas:'vp',tarjCirc:'vtc',seguros:'vs'};const el=document.getElementById(prefixes[arr]+'-'+vid+'-'+idx);if(!el)return;const ns=parseFloat(el.value);if(isNaN(ns)||ns<=0){alert('Ingresa monto válido');return}v[arr][idx].costo=ns;sv();rVeh()};

const delVehItem=(vid,arr,idx)=>{const v=D.vehs.find(x=>x.id===vid);if(!v||!v[arr])return;v[arr].splice(idx,1);sv();rVeh()};

const ST=(t,el)=>{ct=t;['g','a','d','r','f','p','b','v','cfg'].forEach(k=>{const e=document.getElementById('p-'+k);if(e)e.classList.toggle('vis',k===t)});document.querySelectorAll('.mb').forEach(b=>b.classList.remove('on'));if(el)el.classList.add('on');if(t==='g')rG();if(t==='a')rAh();if(t==='d')rDe();if(t==='r')rRec();if(t==='f')rFut();if(t==='p')rPr();if(t==='b')rDb();if(t==='v')rVeh();if(t==='cfg')rCfg()};
const setP=(p,el)=>{cp=p;tblP=0;document.querySelectorAll('.ptab').forEach(b=>b.classList.remove('on'));el.classList.add('on');rAll()};
const rAll=()=>{rSum();rRule();rAlerts();rDonuts();rWA();if(ct==='g')rG();if(ct==='a')rAh();if(ct==='d')rDe();if(ct==='r')rRec();if(ct==='f')rFut();if(ct==='p')rPr();if(ct==='b')rDb();if(ct==='v')rVeh();if(ct==='cfg')rCfg()};
rAll();
