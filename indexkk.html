<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Finanzas 360 — Mockup Funcional</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,500;0,9..40,700;1,9..40,400&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<style>
:root{
--bg:#f6f5f0;--card:#fff;--border:#e8e6df;--t1:#1a1a18;--t2:#6b6a65;--t3:#a3a29b;
--blue:#2563eb;--blue-bg:#eff4ff;--blue-t:#1e40af;
--green:#16a34a;--green-bg:#ecfdf5;--green-t:#166534;
--red:#dc2626;--red-bg:#fef2f2;--red-t:#991b1b;
--amber:#61584d;--amber-bg:#fffbeb;--amber-t:#92400e;
--purple:#7c3aed;--purple-bg:#f5f3ff;--purple-t:#5b21b6;
--teal:#0d9488;--teal-bg:#f0fdfa;--teal-t:#115e59;
--radius:10px;--radius-lg:14px;
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'DM Sans',system-ui,sans-serif;background:var(--bg);color:var(--t1);font-size:14px;line-height:1.5;-webkit-font-smoothing:antialiased}
input,select,button{font-family:inherit;font-size:13px;outline:none}
input,select{padding:8px 10px;border:1.5px solid var(--border);border-radius:8px;background:#fff;color:var(--t1);transition:border-color .15s}
input:focus,select:focus{border-color:var(--blue)}
button{cursor:pointer;border:none;border-radius:8px;padding:8px 14px;font-weight:500;transition:all .12s}
button:active{transform:scale(.97)}
.app{max-width:1140px;margin:0 auto;padding:16px}

/* NAV */
.nav{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;flex-wrap:wrap;gap:10px}
.logo{font-size:20px;font-weight:700;letter-spacing:-.5px;display:flex;align-items:center;gap:8px}
.logo span{background:linear-gradient(135deg,var(--blue),var(--purple));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.nav-r{display:flex;gap:8px;align-items:center;flex-wrap:wrap}
.period-tabs{display:flex;background:var(--card);border:1.5px solid var(--border);border-radius:10px;padding:3px;gap:2px}
.ptab{padding:6px 12px;border-radius:8px;background:transparent;color:var(--t2);font-size:12px;font-weight:500}
.ptab.on{background:var(--t1);color:#fff}
.wa-area{display:flex;gap:4px;align-items:center}
.wa-area input{width:120px;font-size:11px;padding:5px 8px;border-color:#25D366}
.wa-area .ws{font-size:10px;color:var(--green-t);background:var(--green-bg);padding:2px 6px;border-radius:6px}
.btn-wa{background:#25D366;color:#fff;padding:5px 10px;font-size:11px}
.btn-sm{padding:4px 8px;font-size:11px}

/* ALERTS */
.alert{border-radius:var(--radius);padding:10px 14px;margin-bottom:8px;font-size:13px;font-weight:500;display:flex;align-items:center;gap:8px}
.alert.err{background:#1c0606;color:#fca5a5;border:1.5px solid #7f1d1d}
.alert.warn{background:#1a0f00;color:#fcd34d;border:1.5px solid #78350f}
.alert.ok{background:var(--green-bg);color:var(--green-t);border:1.5px solid #86efac}

/* SUMMARY */
.sum-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:8px}
.scard{background:var(--card);border:1.5px solid var(--border);border-radius:var(--radius-lg);padding:14px 16px}
.scard label{font-size:11px;color:var(--t3);font-weight:500;display:block;margin-bottom:2px;text-transform:uppercase;letter-spacing:.5px}
.scard .val{font-size:22px;font-weight:700;font-variant-numeric:tabular-nums}
.scard.positive .val{color:var(--green)}
.scard.negative .val{color:var(--red)}
.scard.blue .val{color:var(--blue)}


/* FISCAL */
.fiscal-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:6px;margin-bottom:10px}
.fcard{background:var(--card);border:1.5px solid var(--border);border-radius:var(--radius);padding:8px 10px;text-align:center}
.fcard label{font-size:9px;color:var(--t3);display:block;text-transform:uppercase;letter-spacing:.5px;margin-bottom:2px}
.fcard .val{font-size:16px;font-weight:700;color:var(--red)}
.fcard .sub{font-size:10px;color:var(--t3)}
.fcard.rec{border-color:var(--blue);background:var(--blue-bg)}
.fcard.rec .val{color:var(--blue)}
.fcard.rec label{color:var(--blue-t)}

/* RULE 50-30-20 */
.rule-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:10px}
.rule-card{border-radius:var(--radius-lg);padding:16px;position:relative;overflow:hidden}
.rule-card.n{background:var(--blue-bg);border:1.5px solid #bfdbfe}
.rule-card.d{background:var(--amber-bg);border:1.5px solid #fde68a}
.rule-card.a{background:var(--green-bg);border:1.5px solid #bbf7d0}
.rule-card.over{background:#1c0606 !important;border:2px solid var(--red) !important}
.rule-pct{font-size:32px;font-weight:700;line-height:1}
.rule-card.n .rule-pct{color:var(--blue-t)}.rule-card.d .rule-pct{color:var(--amber-t)}.rule-card.a .rule-pct{color:var(--green-t)}
.rule-card.over .rule-pct{color:#fca5a5}
.rule-lbl{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.8px;margin:4px 0 10px;opacity:.7}
.rule-card.over .rule-lbl{color:#fca5a5}
.rule-bar{height:6px;background:rgba(0,0,0,.08);border-radius:99px;margin-bottom:6px}
.rule-fill{height:100%;border-radius:99px;transition:width .5s}
.rule-card.n .rule-fill{background:var(--blue)}.rule-card.d .rule-fill{background:var(--amber)}.rule-card.a .rule-fill{background:var(--green)}
.rule-card.over .rule-fill{background:var(--red)}
.rule-nums{font-size:11px;display:flex;justify-content:space-between;color:var(--t2)}
.rule-card.over .rule-nums{color:#fca5a5}
.rule-excess{font-size:11px;font-weight:700;color:#fca5a5;margin-top:4px}

/* DONUTS */
.donut-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:12px}
.donut-card{background:var(--card);border:1.5px solid var(--border);border-radius:var(--radius-lg);padding:14px}
.donut-card h4{font-size:12px;font-weight:600;margin-bottom:8px}
canvas.dc{display:block;margin:0 auto}
.leg{margin-top:8px}.leg-i{display:flex;align-items:center;gap:6px;margin:3px 0}
.leg-i .dot{width:10px;height:10px;border-radius:3px;flex-shrink:0}
.leg-i span{font-size:10px;color:var(--t2)}

/* MODULE TABS */
.mod-tabs{display:flex;background:var(--card);border:1.5px solid var(--border);border-radius:var(--radius);padding:4px;gap:3px;margin-bottom:12px;overflow-x:auto}
.mtab{padding:8px 16px;border-radius:8px;background:transparent;color:var(--t2);font-size:12px;font-weight:600;white-space:nowrap;transition:all .15s}
.mtab:hover{background:var(--bg)}
.mtab.on{background:var(--t1);color:#fff}

/* MODULES */
.mod{display:none}.mod.vis{display:block}

/* GASTOS LAYOUT */
.g-layout{display:grid;grid-template-columns:300px 1fr;gap:12px}
.panel{background:var(--card);border:1.5px solid var(--border);border-radius:var(--radius-lg);padding:16px}
.panel h3{font-size:14px;font-weight:600;margin-bottom:12px}
.form-tabs{display:flex;background:var(--bg);border-radius:8px;padding:3px;gap:2px;margin-bottom:12px}
.ftab{flex:1;padding:7px;border-radius:6px;background:transparent;color:var(--t2);font-size:11px;font-weight:600;text-align:center}
.ftab.on{background:var(--card);color:var(--t1);box-shadow:0 1px 3px rgba(0,0,0,.05)}
.fld{margin-bottom:8px}
.fld label{display:block;font-size:10px;color:var(--t3);font-weight:500;margin-bottom:3px;text-transform:uppercase;letter-spacing:.3px}
.fg2{display:grid;grid-template-columns:1fr 1fr;gap:6px}
.fg3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:6px}
.fg4{display:grid;grid-template-columns:1fr 1fr 1fr 1fr;gap:6px}
.btn-primary{background:var(--t1);color:#fff;width:100%;padding:10px;font-size:13px;font-weight:600}
.btn-primary:hover{opacity:.85}
.btn-green{background:var(--green);color:#fff;width:100%;padding:10px;font-size:13px;font-weight:600}
.btn-red{background:var(--red-bg);color:var(--red-t);padding:4px 8px;font-size:11px;border:1px solid #fecaca}
.btn-green-sm{background:var(--green-bg);color:var(--green-t);padding:4px 8px;font-size:11px;border:1px solid #bbf7d0}
.btn-blue{background:var(--blue-bg);color:var(--blue-t);width:100%;padding:10px;font-size:13px;font-weight:600;border:1px solid #bfdbfe}
.btn-amber{background:var(--amber-bg);color:var(--amber-t);width:100%;padding:10px;font-size:13px;font-weight:600;border:1px solid #fde68a}

/* TOGGLE */
.toggle-row{display:flex;align-items:center;gap:8px;padding:8px 10px;background:var(--bg);border-radius:8px;cursor:pointer;margin-bottom:8px}
.toggle-track{width:32px;height:18px;border-radius:9px;background:var(--border);position:relative;transition:background .2s;flex-shrink:0}
.toggle-track.on{background:var(--green)}
.toggle-thumb{width:12px;height:12px;background:#fff;border-radius:50%;position:absolute;top:3px;left:3px;transition:left .2s}
.toggle-track.on .toggle-thumb{left:17px}

/* TABLE */
.tbl-wrap{border:1.5px solid var(--border);border-radius:var(--radius);overflow:hidden;margin-top:8px}
table{width:100%;border-collapse:collapse}
th{padding:8px 12px;text-align:left;font-size:10px;font-weight:600;color:var(--t3);text-transform:uppercase;letter-spacing:.5px;border-bottom:1.5px solid var(--border);background:var(--bg)}
td{padding:10px 12px;font-size:13px;border-bottom:1px solid var(--border)}
tr:last-child td{border-bottom:none}
tr:hover td{background:var(--bg)}
.pag{display:flex;align-items:center;justify-content:center;gap:6px;padding:10px}
.pag button{padding:5px 10px;border-radius:6px;border:1.5px solid var(--border);background:var(--card);font-size:11px;font-weight:500;color:var(--t2)}
.pag button:disabled{opacity:.3}
.pag span{font-size:11px;color:var(--t3)}

/* BADGES */
.badge{display:inline-flex;align-items:center;gap:3px;padding:2px 8px;border-radius:99px;font-size:10px;font-weight:600}
.b-blue{background:var(--blue-bg);color:var(--blue-t)}
.b-green{background:var(--green-bg);color:var(--green-t)}
.b-red{background:var(--red-bg);color:var(--red-t)}
.b-amber{background:var(--amber-bg);color:var(--amber-t)}
.b-gray{background:var(--bg);color:var(--t2)}
.b-purple{background:var(--purple-bg);color:var(--purple-t)}

/* CARDS */
.card-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:8px;margin-top:8px}
.crd{background:var(--card);border:1.5px solid var(--border);border-radius:var(--radius-lg);padding:14px;transition:border-color .15s}
.crd:hover{border-color:var(--t3)}
.crd-hdr{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:6px}
.crd-title{font-size:13px;font-weight:600}
.crd-amt{font-size:22px;font-weight:700;font-variant-numeric:tabular-nums;margin:4px 0}
.crd-row{display:flex;justify-content:space-between;font-size:11px;color:var(--t2);margin:3px 0}
.crd-footer{margin-top:8px;padding-top:8px;border-top:1px solid var(--border);display:flex;gap:4px;align-items:center}
.crd-footer input{flex:1;padding:6px 8px;font-size:12px}
.bar-track{height:4px;background:var(--bg);border-radius:99px;overflow:hidden;margin:4px 0}
.bar-fill{height:100%;border-radius:99px;transition:width .4s}
.sparkline{display:flex;align-items:flex-end;gap:2px;height:20px;margin-top:4px}
.sparkline div{flex:1;min-width:4px;border-radius:2px 2px 0 0}
.barchart{display:flex;align-items:flex-end;gap:2px;height:50px;margin:6px 0}
.barchart div{flex:1;min-width:4px;border-radius:3px 3px 0 0;background:#bfdbfe;transition:height .3s}
.empty-state{text-align:center;padding:2rem;color:var(--t3);font-size:12px;border:1.5px dashed var(--border);border-radius:var(--radius);margin-top:8px}
.add-row{display:flex;gap:4px;align-items:center;margin-top:6px}
.add-row input{flex:1;font-size:11px;padding:5px 8px}
.super-box{background:var(--amber-bg);border:1px solid #fde68a;border-radius:8px;padding:8px;margin-bottom:6px}
.super-box label{font-size:10px;font-weight:600;color:var(--amber-t);margin-bottom:4px;display:block}
.proj-result{padding:10px;border-radius:8px;margin-top:8px;font-size:12px;font-weight:500}
.proj-result.ok{background:var(--green-bg);color:var(--green-t);border:1px solid #bbf7d0}
.proj-result.bad{background:var(--red-bg);color:var(--red-t);border:1px solid #fecaca}
.pmt-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(28px,1fr));gap:2px;margin-top:6px}
.pmt{text-align:center;padding:3px;border-radius:4px;font-size:9px;font-weight:600}
.pmt.paid{background:var(--green-bg);color:var(--green-t)}
.pmt.pending{background:var(--bg);color:var(--t3)}
.ded-box{background:var(--red-bg);border:1px solid #fecaca;border-radius:8px;padding:10px;margin-bottom:6px}
.ded-box .ded-title{font-size:10px;font-weight:600;color:var(--red-t);text-align:center;margin-bottom:6px}
.tipo-chips{display:flex;flex-wrap:wrap;gap:4px;margin-bottom:6px}
.tc{padding:5px 10px;border-radius:6px;border:1.5px solid var(--border);background:transparent;font-size:11px;font-weight:500;color:var(--t2)}
.tc.on{background:var(--t1);color:#fff;border-color:var(--t1)}

/* RESPONSIVE */
@media(max-width:768px){
  .sum-grid{grid-template-columns:1fr 1fr}
  .fiscal-grid{grid-template-columns:repeat(3,1fr)}
  .rule-grid{grid-template-columns:1fr}
  .donut-grid{grid-template-columns:1fr 1fr 1fr}
  .g-layout{grid-template-columns:1fr}
  .card-grid{grid-template-columns:repeat(auto-fill,minmax(220px,1fr))}
}
@media(max-width:480px){
  .sum-grid{grid-template-columns:1fr 1fr}
  .fiscal-grid{grid-template-columns:1fr 1fr 1fr}
  .donut-grid{grid-template-columns:1fr}
  .fg2,.fg3,.fg4{grid-template-columns:1fr}
  .card-grid{grid-template-columns:1fr}
  .mod-tabs{gap:1px}
  .mtab{padding:6px 10px;font-size:11px}
}
</style>
</head>
<body>
<div class="app">
<div class="nav">
  <div class="logo"><span>Finanzas 360</span></div>
  <div class="nav-r">
    <div class="wa-area" id="wa-area"></div>
    <div class="period-tabs">
      <button class="ptab" onclick="setP('dia',this)">Hoy</button>
      <button class="ptab" onclick="setP('sem',this)">Sem</button>
      <button class="ptab on" onclick="setP('mes',this)">Mes</button>
      <button class="ptab" onclick="setP('año',this)">Año</button>
      <button class="ptab" onclick="setP('todo',this)">Todo</button>
    </div>
  </div>
</div>
<div id="alerts"></div>
<div class="sum-grid" id="sum"></div>
<div class="fiscal-grid" id="fiscal"></div>
<div class="rule-grid" id="rule"></div>
<div class="donut-grid" id="donuts"></div>
<div class="mod-tabs" id="modtabs">
  <button class="mtab on" onclick="ST('g',this)">Gastos</button>
  <button class="mtab" onclick="ST('a',this)">Ahorros</button>
  <button class="mtab" onclick="ST('d',this)">Crédito</button>
  <button class="mtab" onclick="ST('r',this)">Recurrentes</button>
  <button class="mtab" onclick="ST('f',this)">Futuros</button>
  <button class="mtab" onclick="ST('p',this)">Préstamos</button>
</div>
<div id="p-g" class="mod vis"></div>
<div id="p-a" class="mod"></div>
<div id="p-d" class="mod"></div>
<div id="p-r" class="mod"></div>
<div id="p-f" class="mod"></div>
<div id="p-p" class="mod"></div>
</div>

<script>
// This is a mockup — all data is preloaded to simulate realistic usage

const CATS={NOMINA:{n:'Nómina',iv:0,ie:0,r:'',c:['Nómina Q1','Nómina Q2']},EXTRA:{n:'Extra',iv:0,ie:0,r:'',c:['Freelance','Venta','Bono','Renta recibida']},CREDITO:{n:'Crédito',iv:0,ie:0,r:'N',c:['Traspaso Créd→Déb','Comisión Disp.','Intereses','Anualidad']},SERVICIOS:{n:'Servicios',iv:.16,ie:0,rec:1,r:'N',c:[{n:'Internet',f:'mensual'},{n:'Celular',f:'mensual'},{n:'Luz',f:'bimestral'},{n:'Agua',f:'trimestral'},{n:'Gas',f:'bimestral'}]},ALIMENTOS:{n:'Alimentos',iv:0,ie:0,r:'N',c:['Frutas/Verduras','Carne/Pollo','Tortillas','Agua garrafón']},DESPENSA:{n:'Despensa',iv:.16,ie:0,r:'N',c:['Abarrotes','Limpieza','Higiene','Super (ticket IVA)']},SALUD:{n:'Salud',iv:0,ie:0,r:'N',c:['Consulta','Medicinas','Seguro médico']},RENTA:{n:'Renta',iv:0,ie:0,r:'N',c:['Renta','Hipoteca']},TRANSPORTE:{n:'Transporte',iv:.16,ie:.08,r:'N',c:['Gasolina','Manten. Auto','Seguro Auto','Peajes']},APP:{n:'Transp. App',iv:.16,ie:0,r:'D',c:['Uber','DiDi','InDriver','Rappi']},ENTRET:{n:'Entretenimiento',iv:.16,ie:0,rec:1,r:'D',c:[{n:'Netflix',f:'mensual'},{n:'Disney+',f:'mensual'},{n:'Spotify',f:'mensual'},{n:'Max',f:'mensual'},{n:'Cine',f:null}]},RESTAURANTES:{n:'Restaurantes',iv:.16,ie:0,r:'D',c:['Restaurante','Café','Comida rápida']},MODA:{n:'Compras',iv:.16,ie:0,r:'D',c:['Ropa','Calzado','Electrónica']},VIAJES:{n:'Viajes',iv:.16,ie:0,r:'D',c:['Vuelos','Hotel','Tour']},AHORRO_INV:{n:'Ahorro/Inv',iv:0,ie:0,r:'A',c:['Depósito ahorro','CETES','Fondo emerg.']},DEUDA_PAGO:{n:'Pago Deudas',iv:0,ie:0,r:'A',c:['Abono extra','Pago tarjeta','Pago préstamo']}};
const FR={semanal:{l:'Semanal',m:.25},quincenal:{l:'Quincenal',m:.5},mensual:{l:'Mensual',m:1},bimestral:{l:'Bimestral',m:2},trimestral:{l:'Trimestral',m:3}};
const INS=['BBVA','Mercado Pago','Rappi','Nu','Santander','Efectivo'];
const TC={TARJETA:{l:'Tarjeta',b:'b-blue'},PRESTAMO:{l:'Préstamo',b:'b-amber'},DISPOSICION:{l:'Disposición',b:'b-red'},BNPL:{l:'A Meses',b:'b-purple'},LINEA:{l:'Línea',b:'b-green'}};
const RN=['CREDITO','SERVICIOS','ALIMENTOS','DESPENSA','SALUD','RENTA','TRANSPORTE'],RD=['APP','ENTRET','RESTAURANTES','MODA','VIAJES'],RA=['AHORRO_INV','DEUDA_PAGO'];
const COL={'RENTA':'#818cf8','SERVICIOS':'#60a5fa','ALIMENTOS':'#4ade80','DESPENSA':'#86efac','TRANSPORTE':'#fbbf24','CREDITO':'#f87171','APP':'#f59e0b','ENTRET':'#ec4899','RESTAURANTES':'#fb923c','MODA':'#f472b6','VIAJES':'#2dd4bf','AHORRO_INV':'#22c55e','DEUDA_PAGO':'#ef4444','SALUD':'#5eead4'};

let uid=()=>Date.now().toString(36)+Math.random().toString(36).slice(2,5);
let fm=n=>Number(n||0).toLocaleString('es-MX',{minimumFractionDigits:2,maximumFractionDigits:2});
let fk=n=>{let x=Number(n||0);return x>=10000?'$'+(x/1000).toFixed(1)+'k':'$'+fm(x)};
let cn=c=>typeof c==='string'?c:c.n;
let cf=c=>typeof c==='string'?null:c.f;
let td=()=>new Date().toISOString().split('T')[0];
let gt=h=>{if(!h||h.length<2)return'=';return h[h.length-1].s>h[h.length-2].s?'↑':h[h.length-1].s<h[h.length-2].s?'↓':'='};
let dh=d=>{if(!d)return null;let h=new Date();h.setHours(0,0,0,0);let t=new Date(h.getFullYear(),h.getMonth(),d);if(t<=h)t=new Date(h.getFullYear(),h.getMonth()+1,d);return Math.ceil((t-h)/864e5)};
let df=s=>{if(!s)return null;let h=new Date();h.setHours(0,0,0,0);return Math.ceil((new Date(s+'T00:00:00')-h)/864e5)};

// MODULE: PRÉSTAMOS
function rPr(){let tDe=D.de.reduce((s,dd)=>s+dd.sal,0),tTerc=D.ln.reduce((s,l)=>s+Math.max((l.pagos-l.pagados)*l.pago,0),0),tMio=Math.max(tDe-tTerc,0);document.getElementById('p-p').innerHTML=`<div class="panel"><h3>Préstamos y compras para terceros</h3><p style="font-size:12px;color:var(--t3);margin-bottom:12px">Registra compras con tu tarjeta para familiares o préstamos directos. Cobra interés si aplica.</p><div class="fg2"><div class="fld"><label>Descripción</label><input id="ln-d" placeholder="Laptop para hermano"></div><div class="fld"><label>Persona</label><input id="ln-pe" placeholder="Nombre del familiar"></div></div><div class="fg2"><div class="fld"><label>Tarjeta / crédito usado</label><select id="ln-tc">${D.de.map(dd=>`<option>${dd.n}</option>`).join('')}<option>Efectivo / Directo</option></select></div><div class="fld"><label>Monto total ($)</label><input id="ln-mt" type="number" step="0.01"></div></div><div class="fg4"><div class="fld"><label>Pagos totales</label><input id="ln-pg" type="number" min="1" value="12"></div><div class="fld"><label>Pagados</label><input id="ln-pc" type="number" min="0" value="0"></div><div class="fld"><label>Interés %/mes</label><input id="ln-int" type="number" step="0.1" value="0" placeholder="0=sin, 2.5=tipo MP"></div><div class="fld"><label>Frecuencia</label><select id="ln-fr"><option value="semanal">Semanal</option><option value="quincenal">Quincenal</option><option value="mensual" selected>Mensual</option></select></div></div><div class="fld"><label>Fecha primer pago</label><input id="ln-fp" type="date" value="${td()}"></div><button class="btn-amber" style="margin-top:6px" onclick="sLn()">+ Registrar préstamo</button></div>
${D.ln.length?`<div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin:12px 0"><div class="scard blue"><label>Mi deuda real</label><div class="val" style="font-size:18px">$${fm(tMio)}</div></div><div class="scard positive"><label>Me deben terceros</label><div class="val" style="font-size:18px">$${fm(tTerc)}</div></div></div><div style="display:flex;height:14px;border-radius:7px;overflow:hidden;margin-bottom:12px"><div style="width:${tDe>0?Math.round(tMio/tDe*100):50}%;background:#60a5fa"></div><div style="width:${tDe>0?Math.round(tTerc/tDe*100):50}%;background:#4ade80"></div></div><div style="display:flex;gap:12px;font-size:11px;margin-bottom:8px"><span style="display:flex;align-items:center;gap:4px"><span style="width:10px;height:10px;border-radius:3px;background:#60a5fa;display:inline-block"></span>Mi deuda (${tDe>0?(tMio/tDe*100).toFixed(0):0}%)</span><span style="display:flex;align-items:center;gap:4px"><span style="width:10px;height:10px;border-radius:3px;background:#4ade80;display:inline-block"></span>Terceros (${tDe>0?(tTerc/tDe*100).toFixed(0):0}%)</span></div>`:''}<div class="card-grid">${D.ln.map(l=>{let rest=l.pagos-l.pagados,pmI=l.interes>0?l.pago*(1+l.interes/100):l.pago;let pmts=Array.from({length:l.pagos},(_,i)=>i<l.pagados?'paid':'pending');let np=calcNP(l.fPago,l.frec||'mensual',l.pagados);return`<div class="crd"><div class="crd-hdr"><div><div class="crd-title">${l.desc}</div><div style="font-size:11px;color:var(--t3)">${l.persona} · ${l.tc} · ${FR[l.frec||'mensual']?.l||'Mensual'}</div></div><button class="btn-red btn-sm" onclick="dLn('${l.id}')">✕</button></div><div class="crd-amt" style="color:var(--amber)">$${fm(l.montoTotal)}</div><div class="crd-row"><span>Pagos: ${l.pagados} / ${l.pagos}</span><span>$${fm(pmI)} / pago${l.interes>0?' ('+l.interes+'% int.)':''}</span></div><div class="crd-row"><span>Por cobrar</span><span style="color:var(--green);font-weight:600">$${fm(rest*pmI)}</span></div>${np?`<div class="crd-row"><span>Próximo pago</span><span class="badge b-amber">${np}</span></div>`:''}<div class="pmt-grid">${pmts.map((p,i)=>`<div class="pmt ${p}">${i+1}</div>`).join('')}</div><div class="crd-footer"><button class="btn-green-sm" onclick="payLn('${l.id}')">✓ Marcar pago completado</button></div></div>`}).join('')||'<div class="empty-state">Sin préstamos a terceros registrados</div>'}</div>`}
function calcNP(fp,fr,pd){if(!fp)return'';let dd=new Date(fp+'T00:00:00');let m=FR[fr]?.m||1;if(m<1)dd.setDate(dd.getDate()+Math.round(m*30*pd));else dd.setMonth(dd.getMonth()+m*pd);return fDate(dd.toISOString().split('T')[0])}
function sLn(){let dd=document.getElementById('ln-d')?.value||'Préstamo',pe=document.getElementById('ln-pe')?.value||'',tc=document.getElementById('ln-tc')?.value||'Efectivo',mt=parseFloat(document.getElementById('ln-mt')?.value||0),pg=parseInt(document.getElementById('ln-pg')?.value||12),pc=parseInt(document.getElementById('ln-pc')?.value||0),int=parseFloat(document.getElementById('ln-int')?.value||0),fr=document.getElementById('ln-fr')?.value||'mensual',fp=document.getElementById('ln-fp')?.value||td();if(!mt)return;D.ln.push({id:uid(),desc:dd,persona:pe,tc,montoTotal:mt,pagos:pg,pagados:pc,pago:mt/pg,interes:int,frec:fr,fPago:fp});sv();rPr()}
function payLn(id){let l=D.ln.find(x=>x.id===id);if(!l||l.pagados>=l.pagos)return;l.pagados++;sv();rPr()}
function dLn(id){D.ln=D.ln.filter(x=>x.id!==id);sv();rPr()}

// NAV
function ST(t,el){ct=t;['g','a','d','r','f','p'].forEach(k=>{let e=document.getElementById('p-'+k);if(e)e.classList.toggle('vis',k===t)});document.querySelectorAll('.mtab').forEach(b=>b.classList.remove('on'));if(el)el.classList.add('on');if(t==='g')rG();if(t==='a')rAh();if(t==='d')rDe();if(t==='r')rRec();if(t==='f')rFut();if(t==='p')rPr()}
function setP(p,el){cp=p;tblP=0;document.querySelectorAll('.ptab').forEach(b=>b.classList.remove('on'));el.classList.add('on');rAll()}
function rAll(){rSum();rRule();rAlerts();rDonuts();rWA();if(ct==='g')rG();if(ct==='a')rAh();if(ct==='d')rDe();if(ct==='r')rRec();if(ct==='f')rFut();if(ct==='p')rPr()}
rAll();
</script>
</body>
</html>
